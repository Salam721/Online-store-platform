[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Fast unit tests with mocked dependencies
    integration: Integration tests using moto AWS mocks
    deployment: Smoke tests to run after cdk deploy
    performance: Load/stress tests (run separately with locust)
